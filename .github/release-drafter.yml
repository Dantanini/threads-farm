name-template: 'Release $RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
template: |
  ## Changes

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
categories:
  - title: 'Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: 'Bug Fixes'
    labels:
      - 'fix'
      - 'bugfix'
  - title: 'Data Updates'
    labels:
      - 'data'
  - title: 'CI/CD'
    labels:
      - 'ci'
      - 'automation'
  - title: 'Other'
    labels:
      - 'chore'
      - 'docs'
change-template: '- $TITLE (#$NUMBER)'
no-changes-template: 'No changes since last release.'
version-resolver:
  major:
    labels:
      - 'major'
  minor:
    labels:
      - 'minor'
      - 'feature'
  patch:
    labels:
      - 'patch'
      - 'fix'
      - 'data'
  default: patch
