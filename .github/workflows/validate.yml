name: Validate Data

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate schema
        run: python3 scripts/validate_schema.py

      - name: Check for duplicate handles
        run: |
          python3 -c "
          import json
          with open('data/farmers.json') as f:
              data = json.load(f)
          handles = [d['handle'] for d in data]
          dupes = [h for h in handles if handles.count(h) > 1]
          if dupes:
              print(f'⚠️ Duplicate handles: {set(dupes)}')
          else:
              print('✅ No duplicate handles')
          "

      - name: Validate HTML structure
        run: python3 scripts/validate_html.py

      - name: Verify changed farmer data against Threads
        run: python3 scripts/verify_farmers.py
        continue-on-error: true

      - name: Scan for sensitive data
        run: |
          echo "Scanning for sensitive data patterns..."
          if grep -rEi '(bot.?token|api.?key|secret.?key|password\s*[:=])\s*[:=]\s*["\x27]' --include='*.html' --include='*.js' --include='*.json' . | grep -v node_modules | grep -v '.github'; then
            echo "❌ Potential sensitive data found!"
            exit 1
          else
            echo "✅ No sensitive data detected"
          fi
