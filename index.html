let activeRegion = '';

function getRegions() {
  const regions = [...new Set(farmers.map(f => f.region).filter(r => r))];
  return regions.sort();
}

function initFilters() {
  const container = document.getElementById('region-filters');
  const all = document.createElement('button');
  all.className = 'filter-btn active';
  all.textContent = '全部';
  all.onclick = () => { activeRegion = ''; render(); };
  container.appendChild(all);

  getRegions().forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = r;
    btn.onclick = () => { activeRegion = r; render(); };
    container.appendChild(btn);
  });
}

function render() {
  const query = document.getElementById('search').value.trim().toLowerCase();

  let filtered = farmers.filter(f => {
    if (activeRegion && f.region !== activeRegion) return false;
    if (query) {
      const searchText = `${f.handle} ${f.name} ${f.product} ${f.region} ${f.price} ${f.cert}`.toLowerCase();
      return query.split(/\s+/).every(q => searchText.includes(q));
    }
    return true;
  });

  // Update filter button states
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active',
      (btn.textContent === '全部' && !activeRegion) || btn.textContent === activeRegion
    );
  });

  // Stats
  document.getElementById('stat-farmers').textContent = farmers.length;
  document.getElementById('stat-regions').textContent = getRegions().length;

  // Result count
  document.getElementById('result-count').textContent =
    filtered.length === farmers.length ? `共 ${filtered.length} 筆` : `找到 ${filtered.length} 筆`;

  // Cards
  const list = document.getElementById('card-list');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">找不到符合的結果，試試其他關鍵字</div>';
    return;
  }

  list.innerHTML = filtered.map(f => {
    const threadsUrl = `https://www.threads.com/${f.handle.replace('@', '@')}`;
    const displayName = f.name ? `${f.name} ${f.handle}` : f.handle;

    let certBadges = '';
    if (f.cert) {
      f.cert.split('、').forEach(c => {
        certBadges += `<span class="badge-cert">${c.trim()}</span>`;
      });
    }

    return `
      <div class="card">
        <div class="card-top">
          <div class="card-name"><a href="${threadsUrl}" target="_blank">${displayName}</a></div>
          ${f.region ? `<span class="card-region">${f.region}</span>` : ''}
        </div>
        <div class="card-product">${f.product || '（品項待補充）'}${certBadges}</div>
        <div class="card-details">
          ${f.price ? `<span>$ ${f.price}</span>` : ''}
          ${f.min ? `<span>最低 ${f.min}</span>` : ''}
          ${f.buy ? `<span>${f.buy}</span>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

// 頁面切換
function switchPage(page) {
  document.querySelectorAll('.nav-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (page === 'search' && i === 0) || (page === 'report' && i === 1));
  });
  document.getElementById('page-search').classList.toggle('active', page === 'search');
  document.getElementById('page-report').classList.toggle('active', page === 'report');
}

function switchReportTab(tab) {
  document.querySelectorAll('.report-tab').forEach((t, i) => {
    t.classList.toggle('active', (tab === 'farmer' && i === 0) || (tab === 'report' && i === 1));
  });
  document.getElementById('section-farmer').classList.toggle('active', tab === 'farmer');
  document.getElementById('section-report').classList.toggle('active', tab === 'report');
}

initFilters();
render();
</script>
</body>
</html>
